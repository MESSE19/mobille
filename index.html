<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #00F0FF;
            --primary-hover: #5cf5ff;
            --secondary: #3A86FF;
            --danger: #FF4D6D;
            --success: #00FFAA;
            --bg-main: #0A0F1D;
            --bg-card: #12192D;
            --text-main: #F0F4FF;
            --text-muted: #A0B0D0;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); overflow-x: hidden; }
        
        .hidden { display: none !important; }
        .w-100 { width: 100%; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: var(--radius);
            background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid rgba(0,240,255,0.3); outline: none; font-size: 16px;
        }
        input:focus, select:focus { border-color: var(--primary); }
        
        button {
            border: none; padding: 14px; border-radius: var(--radius);
            font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-secondary { background: var(--secondary); color: #fff; }
        .btn-danger { background: var(--danger); color: #fff; }

        /* Login Screen */
        #login-screen {
            position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg-main);
            display: flex; flex-direction: column; justify-content: center; padding: 20px; z-index: 999;
        }
        .login-card { background: var(--bg-card); padding: 30px 20px; border-radius: 12px; border: 1px solid rgba(0,240,255,0.2); }
        .login-card h1 { color: var(--primary); text-align: center; margin-bottom: 24px; font-size: 28px;}
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 14px; color: var(--text-muted); margin-bottom: 6px; }

        /* App Layout */
        #app-layout { padding-bottom: 80px; }
        header { background: var(--bg-card); padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10;}
        header h2 { font-size: 18px; color: var(--primary); margin:0;}
        .user-chip { font-size: 12px; color: var(--text-muted); display:flex; align-items:center; gap:4px;}

        /* Search & Filters */
        .filters { padding: 15px; position: sticky; top: 54px; background: var(--bg-main); z-index: 9; }
        .category-scroll { display: flex; overflow-x: auto; gap: 8px; margin-top: 10px; padding-bottom: 5px; }
        .pill { padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; white-space: nowrap; font-size: 14px; }
        .pill.active { background: rgba(0,240,255,0.15); border-color: var(--primary); color: var(--primary); }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 15px 15px; }
        .ptile { background: var(--bg-card); border-radius: 10px; padding: 12px; border: 1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; justify-content:space-between;}
        .ptile.out { opacity: 0.5; pointer-events: none; }
        .ptile-name { font-size: 14px; margin-bottom: 4px; font-weight: 500; }
        .ptile-price { font-size: 15px; color: var(--success); font-weight: 600; margin-bottom: 8px;}
        .ptile-stock { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
        .add-btn { background: rgba(0,240,255,0.1); color: var(--primary); border: 1px solid var(--primary); padding: 8px; border-radius: 6px; font-size: 14px; width: 100%;}

        /* Cart Bar */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--primary); padding: 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 -4px 15px rgba(0,240,255,0.2); cursor: pointer;
        }
        .cart-bar-info { color: #000; font-weight: 700; font-size: 18px; }
        .cart-bar-btn { color: #000; font-weight: 600; display:flex; align-items:center; gap:6px;}

        /* Cart Modal */
        #cart-modal {
            position: fixed; top:0; left:0; right:0; bottom:0; background: var(--bg-main); z-index: 1000;
            display: flex; flex-direction: column;
            transform: translateY(100%); transition: transform 0.3s ease-out;
        }
        #cart-modal.open { transform: translateY(0); }
        
        .cart-header { padding: 15px; background: var(--bg-card); border-bottom: 1px solid rgba(255,255,255,0.1); display:flex; justify-content:space-between; align-items:center; }
        .cart-items { flex: 1; overflow-y: auto; padding: 15px; display:flex; flex-direction:column; gap:10px; }
        .cart-item { background: var(--bg-card); padding: 12px; border-radius: 8px; display:flex; justify-content:space-between; align-items:center; }
        .cart-item-name { font-size: 14px; margin-bottom:4px; }
        .cart-item-price { font-size: 13px; color: var(--success); }
        .cart-controls { display:flex; align-items:center; gap:12px; }
        .qty-btn { background: rgba(255,255,255,0.1); color: #fff; width: 32px; height: 32px; padding:0; border-radius: 4px; }
        
        .cart-footer { padding: 20px; background: var(--bg-card); border-top: 1px solid rgba(255,255,255,0.1); }
        .summary-row { display:flex; justify-content:space-between; margin-bottom: 10px; color: var(--text-muted); font-size: 14px;}
        .summary-total { display:flex; justify-content:space-between; margin-bottom: 15px; color: #fff; font-size: 20px; font-weight: bold;}
        
        .payment-methods { display: flex; gap: 8px; margin-bottom: 15px; }
        .pay-pill { flex: 1; text-align: center; }
        .pay-pill input { display: none; }
        .pay-pill span { display: block; padding: 10px 5px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 13px; color: var(--text-muted); }
        .pay-pill input:checked + span { background: rgba(0,240,255,0.15); border-color: var(--primary); color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Mobile POS</h1>
            <form id="login-form">
                <div class="input-group">
                    <label>Server IP (Type 'cloud' for Direct Sync)</label>
                    <input type="text" id="login-ip" placeholder="e.g. 192.168.1.50 or 'cloud'" value="cloud" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="input-group">
                    <label>Campus</label>
                    <select id="login-org" required>
                        <option value="Premier">Premier</option>
                        <option value="Foundation">Foundation</option>
                        <option value="Eastview">Eastview</option>
                        <option value="Johnson">Johnson</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary w-100" style="margin-top:20px;">LOGIN</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-layout" class="hidden">
        <header>
            <h2>POS</h2>
            <div class="user-chip">
                <i data-lucide="user" style="width:14px;height:14px;"></i> <span id="user-display">User</span>
                <span id="campus-display" style="margin-left:8px; color:var(--primary);">Campus</span>
            </div>
        </header>

        <div class="filters">
            <input type="text" id="search-input" placeholder="Search products...">
            <div class="category-scroll" id="categories">
                <div class="pill active" data-cat="All">All</div>
                <div class="pill" data-cat="Socks">Socks</div>
                <div class="pill" data-cat="Skirts">Skirts</div>
                <div class="pill" data-cat="Trousers">Trousers</div>
                <div class="pill" data-cat="Blazers">Blazers</div>
            </div>
        </div>

        <div class="product-grid" id="product-grid">
            <!-- Injected via JS -->
        </div>

        <!-- Sticky Cart Bar -->
        <div class="cart-bar hidden" id="cart-bar" onclick="toggleCart(true)">
            <div class="cart-bar-info"><span id="cart-count">0</span> items</div>
            <div class="cart-bar-btn">View Cart <span id="cart-bar-total">$0.00</span> <i data-lucide="chevron-up" style="width:18px;"></i></div>
        </div>
    </div>

    <!-- CART MODAL -->
    <div id="cart-modal">
        <div class="cart-header">
            <h2 style="font-size:18px;">Current Cart</h2>
            <button style="background:transparent; padding:0; color:#fff;" onclick="toggleCart(false)"><i data-lucide="x"></i></button>
        </div>
        <div class="cart-items" id="cart-items">
            <!-- Injected -->
        </div>
        <div class="cart-footer">
            <div class="summary-row"><span>Subtotal</span><span id="cart-subtotal">$0.00</span></div>
            <div class="summary-row"><span>Tax (0%)</span><span>$0.00</span></div>
            <div class="summary-total"><span>Total</span><span class="text-primary" id="cart-total">$0.00</span></div>
            
            <div class="payment-methods">
                <label class="pay-pill"><input type="radio" name="paymethod" value="Cash" checked><span>Cash</span></label>
                <label class="pay-pill"><input type="radio" name="paymethod" value="Transfer"><span>Transfer</span></label>
                <label class="pay-pill"><input type="radio" name="paymethod" value="EcoCash"><span>EcoCash</span></label>
            </div>
            
            <button class="btn-primary w-100" id="checkout-btn"><i data-lucide="check-circle"></i> COMPLETE SALE</button>
        </div>
    </div>

    <script src="mobile.js"></script>
    <script src="manifest.js"></script>
    <script>let currentUser = null;
let currentCampus = 'Premier';
let allProducts = [];
let currentCart = [];
let currentCategory = 'All';
let API_BASE = 'http://localhost:3000/api';
let isCloudMode = false;

const SUPABASE_URL = "https://hogsuxkialcddmdvmeee.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvZ3N1eGtpYWxjZGRtZHZtZWVlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0NTIzNjIsImV4cCI6MjA5MzAyODM2Mn0.UeUsr4sS4a8wx0RwayHZA6toOODJO-4K6sXQqtGA62U";

document.addEventListener('DOMContentLoaded', () => {
    if(window.lucide) window.lucide.createIcons();
});

// Network Helper
async function apiCall(endpoint, method = 'GET', body = null) {
    if (isCloudMode) {
        return null; 
    }

    const options = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) options.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${endpoint}`, options);
    if (!res.ok) {
        let msg = 'Network Error';
        try { const err = await res.json(); msg = err.error || msg; } catch(e){}
        throw new Error(msg);
    }
    return await res.json();
}

// Login Logic
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const ip = document.getElementById('login-ip').value.trim().toLowerCase();
    
    isCloudMode = (ip === 'cloud');
    API_BASE = `http://${ip}:3000/api`;
    
    const u = document.getElementById('login-username').value;
    const p = document.getElementById('login-password').value;
    const org = document.getElementById('login-org').value;
    
    try {
        if (isCloudMode) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/users?username=eq.${u}&password=eq.${p}&select=*`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            const data = await res.json();
            if(!data || data.length === 0) throw new Error('Invalid credentials');
            currentUser = data[0];
        } else {
            currentUser = await apiCall('/login', 'POST', {username: u, password: p});
        }

        currentCampus = org; // Always use the selected campus for mobile POS
        
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-layout').classList.remove('hidden');
        
        document.getElementById('user-display').innerText = currentUser.username;
        document.getElementById('campus-display').innerText = currentCampus;
        
        loadProducts();
    } catch(err) {
        alert('Login failed: ' + err.message);
    }
});

// Load Products
async function loadProducts() {
    try {
        if (isCloudMode) {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/products?select=*`, {
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
            });
            allProducts = await res.json();
        } else {
            allProducts = await apiCall('/products');
        }
        renderGrid();
    } catch(err) {
        alert('Failed to load products: ' + err.message);
    }
}

// Search and Categories
document.getElementById('search-input').addEventListener('input', renderGrid);
document.querySelectorAll('#categories .pill').forEach(pill => {
    pill.addEventListener('click', (e) => {
        document.querySelectorAll('#categories .pill').forEach(p => p.classList.remove('active'));
        e.target.classList.add('active');
        currentCategory = e.target.dataset.cat;
        renderGrid();
    });
});

function renderGrid() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    
    let filtered = allProducts.filter(p => 
        p.campus === currentCampus &&
        (currentCategory === 'All' || p.category === currentCategory) &&
        (p.name.toLowerCase().includes(query) || p.code.toLowerCase().includes(query))
    );

    filtered.forEach(p => {
        const isOut = p.stock_level <= 0;
        const div = document.createElement('div');
        div.className = `ptile ${isOut ? 'out' : ''}`;
        div.innerHTML = `
            <div>
                <div class="ptile-name">${p.name}</div>
                <div class="ptile-stock">Stock: ${p.stock_level} • ${p.size || '-'}</div>
            </div>
            <div>
                <div class="ptile-price">$${p.selling_price.toFixed(2)}</div>
                <button class="add-btn"><i data-lucide="plus" style="width:14px;height:14px;"></i> Add</button>
            </div>
        `;
        if(!isOut) {
            div.querySelector('.add-btn').onclick = () => addToCart(p);
        }
        grid.appendChild(div);
    });
    
    if(window.lucide) window.lucide.createIcons();
}

// Cart Logic
function addToCart(product) {
    const existing = currentCart.find(i => i.id === product.id);
    if(existing) {
        if(existing.quantity < product.stock_level) existing.quantity++;
        else alert('Not enough stock');
    } else {
        currentCart.push({...product, quantity: 1});
    }
    updateCartUI();
}

window.updateQty = (index, delta) => {
    const item = currentCart[index];
    if(delta === 1 && item.quantity >= item.stock_level) return alert('No more stock');
    item.quantity += delta;
    if(item.quantity <= 0) currentCart.splice(index, 1);
    updateCartUI();
};

function updateCartUI() {
    const bar = document.getElementById('cart-bar');
    if(currentCart.length === 0) {
        bar.classList.add('hidden');
        toggleCart(false); // Close modal if open and empty
        return;
    }
    bar.classList.remove('hidden');
    
    let subtotal = 0;
    let count = 0;
    const clist = document.getElementById('cart-items');
    clist.innerHTML = '';
    
    currentCart.forEach((item, index) => {
        subtotal += item.selling_price * item.quantity;
        count += item.quantity;
        
        clist.innerHTML += `
            <div class="cart-item">
                <div>
                    <div class="cart-item-name">${item.name}</div>
                    <div class="cart-item-price">$${item.selling_price.toFixed(2)}</div>
                </div>
                <div class="cart-controls">
                    <button class="qty-btn" onclick="updateQty(${index}, -1)"><i data-lucide="minus" style="width:14px;"></i></button>
                    <span style="color:#fff; font-weight:bold; min-width:16px; text-align:center;">${item.quantity}</span>
                    <button class="qty-btn" onclick="updateQty(${index}, 1)"><i data-lucide="plus" style="width:14px;"></i></button>
                </div>
            </div>
        `;
    });
    
    // Tax is 0% for MVP mobile
    const total = subtotal;
    
    document.getElementById('cart-count').innerText = count;
    document.getElementById('cart-bar-total').innerText = `$${total.toFixed(2)}`;
    document.getElementById('cart-subtotal').innerText = `$${subtotal.toFixed(2)}`;
    document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
    
    if(window.lucide) window.lucide.createIcons();
}

window.toggleCart = (show) => {
    const modal = document.getElementById('cart-modal');
    if(show) {
        modal.classList.add('open');
    } else {
        modal.classList.remove('open');
    }
};

// Checkout
document.getElementById('checkout-btn').addEventListener('click', async () => {
    if(currentCart.length === 0) return alert('Cart is empty');
    
    const subtotal = currentCart.reduce((sum, i) => sum + (i.selling_price * i.quantity), 0);
    const paymentMethod = document.querySelector('input[name="paymethod"]:checked').value;

    try {
        if (isCloudMode) {
            const date = new Date().toISOString();
            const updated_at = Date.now();
            
            // 1. Insert Sale
            const saleRes = await fetch(`${SUPABASE_URL}/rest/v1/sales`, {
                method: 'POST',
                headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                body: JSON.stringify({ total_amount: subtotal, payment_method: paymentMethod, date: date, campus_id: currentCampus, updated_at: updated_at })
            });
            if (!saleRes.ok) throw new Error('Failed to create sale');
            const saleData = await saleRes.json();
            const saleId = saleData[0].id;

            // 2. Insert Items & Update Stock (Batch)
            for (let item of currentCart) {
                await fetch(`${SUPABASE_URL}/rest/v1/sale_items`, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sale_id: saleId, product_id: item.id, quantity: item.quantity, price: item.selling_price, updated_at: updated_at })
                });

                // Since Supabase REST doesn't easily support decrementing without a stored procedure, 
                // we calculate new stock locally. (This is a simplified cloud MVP).
                const newStock = item.stock_level - item.quantity;
                await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${item.id}`, {
                    method: 'PATCH',
                    headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock_level: newStock, updated_at: updated_at })
                });
            }

        } else {
            await apiCall('/sale', 'POST', { 
                cart: currentCart, 
                totalAmount: subtotal, 
                paymentMethod: paymentMethod, 
                campusId: currentCampus 
            });
        }
        
        alert('Sale completed successfully!');
        
        currentCart = [];
        updateCartUI();
        toggleCart(false);
        loadProducts(); // Refresh stock levels
    } catch(e) { 
        alert('Error: ' + e.message); 
    }
});
    </script>
</body>
</html>
